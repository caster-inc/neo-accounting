<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ</title>
  <meta name="description" content="NEO Accountingへのお問い合わせ">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&family=REM:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/common.css">
</head>
<body class="subpage">
  <header class="header">
    <div class="header__inner">
      <a class="header__logo" href="/" aria-label="ホームへ">
        <img src="/assets/img/logo.svg" width="190" height="24" alt="NEO Accounting" decoding="async">
      </a>
      <nav class="header__nav" aria-label="ヘッダーナビゲーション">
        <a class="btn btn--primary btn--sm" href="/dl">資料ダウンロード</a>
        <a class="btn btn--outline btn--sm" href="/contact" aria-current="page">お問い合わせ</a>
      </nav>
    </div>
  </header>

  <main class="subpage__main" id="main">
    <div class="subpage__inner">
      <header class="subpage__head">
        <h1 class="subpage__title">お問い合わせ</h1>
        <p class="subpage__intro">
          ご相談・ご質問などがございましたら、下記フォームよりお気軽にお問い合わせください。<br>
          内容を確認のうえ、担当者よりご連絡いたします。
        </p>
        <p class="subpage__note">必要事項をご入力のうえ、送信してください。</p>
      </header>

      <!-- HubSpot: 次の div 内に埋め込みスクリプトのターゲットとして利用（id / class を維持推奨） -->
      <div class="subpage__form-wrap">
        <div id="hubspot-form-contact" class="hubspot-form-container hubspot-form-surface" data-hubspot-slot="contact">
          <!-- HubSpot フォームの埋め込み先（空でもレイアウト枠を保持） -->
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner section-inner">
      <p class="site-footer__copy"><small>Copyright © Caster Co.Ltd. All rights reserved.</small></p>
    </div>
  </footer>

  <script charset="utf-8" type="text/javascript" src="https://js.hsforms.net/forms/embed/v2.js"></script>
  <script>
    hbspt.forms.create({
      portalId: "8058161",
      formId: "ecf2097c-57ff-4b80-aabf-b0bf2b1cd78d",
      region: "na1",
      target: "#hubspot-form-contact"
    });
  </script>
  <script src="/assets/js/headerSpSticky.js" defer></script>
</body>
</html>
