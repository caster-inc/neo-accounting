<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資料ダウンロード</title>
  <meta name="description" content="NEO Accounting サービス資料のダウンロード">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&family=REM:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/common.css">
</head>
<body class="subpage">
  <header class="header">
    <div class="header__inner">
      <a class="header__logo" href="/" aria-label="ホームへ">
        <img src="/assets/img/logo.svg" width="190" height="24" alt="NEO Accounting" decoding="async">
      </a>
      <nav class="header__nav" aria-label="ヘッダーナビゲーション">
        <a class="btn btn--primary btn--sm" href="/dl" aria-current="page">資料ダウンロード</a>
        <a class="btn btn--outline btn--sm" href="/contact">お問い合わせ</a>
      </nav>
    </div>
  </header>

  <main class="subpage__main" id="main">
    <div class="subpage__inner">
      <header class="subpage__head">
        <h1 class="subpage__title">資料ダウンロード</h1>
        <p class="subpage__intro">
          サービス資料をご用意しております。<br>
          下記フォームに必要事項をご入力のうえ、送信してください。<br>
          送信完了後、資料をダウンロードいただけます。
        </p>
        <p class="subpage__note">資料をご希望の方は、こちらのフォームよりお申し込みください。</p>
      </header>

      <!-- HubSpot: 次の div 内に埋め込み（id / class をターゲットにしやすく維持） -->
      <div class="subpage__form-wrap">
        <div id="hubspot-form-dl" class="hubspot-form-container hubspot-form-surface" data-hubspot-slot="download">
          <!-- HubSpot フォームの埋め込み先（空でもレイアウト枠を保持） -->
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner section-inner">
      <p class="site-footer__copy"><small>© 2026 AI Accounting Inc.</small></p>
    </div>
  </footer>

  <script src="/assets/js/headerSpSticky.js" defer></script>
</body>
</html>
