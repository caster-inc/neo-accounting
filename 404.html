<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found</title>
  <meta name="description" content="指定されたページは存在しません。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&family=REM:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/common.css">
</head>
<body class="subpage subpage--error">
  <header class="header">
    <div class="header__inner">
      <a class="header__logo" href="/" aria-label="ホームへ">
        <img src="/assets/img/logo.svg" width="190" height="24" alt="NEO Accounting" decoding="async">
      </a>
      <nav class="header__nav" aria-label="ヘッダーナビゲーション">
        <a class="btn btn--primary btn--sm" href="/dl">資料ダウンロード</a>
        <a class="btn btn--outline btn--sm" href="/contact">お問い合わせ</a>
      </nav>
    </div>
  </header>

  <main class="subpage__main" id="main">
    <div class="subpage__inner">
      <div class="subpage__head">
        <p class="subpage__eyebrow">404</p>
        <h1 class="subpage__title">ページが見つかりません</h1>
        <div class="subpage__body-text">
          <p>お探しのページは、削除されたか、URLが変更された可能性があります。<br>お手数ですが、トップページより目的のページをお探しください。</p>
        </div>
        <div class="subpage__actions">
          <a class="btn btn--primary btn--lg" href="/">トップページへ戻る</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner section-inner">
      <p class="site-footer__copy"><small>© 2026 AI Accounting Inc.</small></p>
    </div>
  </footer>

  <script src="/assets/js/headerSpSticky.js" defer></script>
</body>
</html>
